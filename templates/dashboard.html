<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shri Timli Farm — Digital Twin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --bg:#F5F3EA;
    --surface:#FFFFFF;
    --surface-2:#EBE6D6;
    --ink:#16241B;
    --ink-soft:#5C6457;
    --line:#D9D0B8;
    --actual:#0E8F72;
    --actual-soft:#DEF2EA;
    --virtual:#6C42C9;
    --virtual-soft:#EBE3F9;
    --amber:#D97B17;
    --amber-soft:#FCEFDA;
    --danger:#C23B2C;
    --ok:#2E8B4E;
    --sky:#2D7DD2;
    --sky-soft:#E2EFFC;
    --leaf:#5A9E2F;
    --leaf-soft:#EBF5DF;
    --radius:10px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:14px;
    line-height:1.45;
  }
  h1,h2,h3,.display{
    font-family:'Space Grotesk',sans-serif;
    margin:0;
    letter-spacing:-0.01em;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{
    font-family:'Inter',sans-serif;
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink);
    border-radius:8px;
    padding:8px 12px;
    font-size:13px;
    font-weight:500;
    transition:background .15s,border-color .15s,transform .1s;
  }
  button:hover{border-color:var(--ink-soft);}
  button:active{transform:translateY(1px);}
  button.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
  button.primary:hover{background:#0e1812;}
  button.ghost{background:transparent;border-color:transparent;color:var(--ink-soft);}
  button.ghost:hover{color:var(--ink);background:var(--surface-2);}
  button.danger-btn{color:var(--danger);}
  button:disabled{opacity:.45;cursor:not-allowed;}
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible{
    outline:2px solid var(--amber);outline-offset:2px;
  }
  input,select{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    border:1px solid var(--line);
    border-radius:6px;
    padding:6px 8px;
    background:var(--surface);
    color:var(--ink);
    width:100%;
  }
  input[type="text"], select{font-family:'Inter',sans-serif;}
  label{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;font-weight:600;display:block;margin-bottom:4px;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* ---------- layout shell ---------- */
  .app{display:flex;min-height:100vh;}

  /* ===== SIDEBAR ===== */
  .sidebar{
    width:230px;
    flex-shrink:0;
    background:var(--surface);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    height:100vh;
    position:sticky;
    top:0;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:16px 14px;border-bottom:1px solid var(--line);}
  .brand-mark{
    width:30px;height:30px;border-radius:8px;flex-shrink:0;
    background:linear-gradient(135deg,var(--leaf),var(--actual) 55%,var(--virtual));
    position:relative;display:flex;align-items:center;justify-content:center;
    font-size:15px;box-shadow:0 2px 6px rgba(14,143,114,.25);
  }
  .brand-text{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px;line-height:1.25;}
  .brand-text span{display:block;font-size:10.5px;color:var(--ink-soft);font-weight:500;font-family:'Inter',sans-serif;}

  /* sensor registry */
  .sensor-page{padding:20px 24px;}
  .sensor-page h2{font-size:16px;margin-bottom:4px;}
  .sensor-page .sp-sub{color:var(--ink-soft);font-size:13px;margin-bottom:18px;}
  .sensor-section{margin-bottom:28px;}
  .sensor-section-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;}
  .sensor-table{width:100%;border-collapse:collapse;}
  .sensor-table th{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);padding:6px 10px;text-align:left;border-bottom:1px solid var(--line);}
  .sensor-table td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle;font-size:13px;}
  .sensor-table tr:last-child td{border-bottom:none;}
  .sensor-table tr.is-new{background:var(--amber-soft);}
  .new-pill{display:inline-block;background:var(--amber);color:#fff;font-size:10px;font-weight:700;border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:middle;letter-spacing:.04em;}
  .sensor-id{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;color:var(--ink-soft);}
  .inline-rename{display:flex;gap:6px;align-items:center;}
  .inline-rename input{border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:13px;background:var(--surface);color:var(--ink);font-family:'Inter',sans-serif;width:140px;}
  .inline-rename input:focus{outline:none;border-color:var(--ink);}
  .sensor-farm-select{border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:12px;background:var(--surface);color:var(--ink);font-family:'Inter',sans-serif;}
  .ack-btn{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid var(--line);background:var(--surface);cursor:pointer;color:var(--ink-soft);}
  .ack-btn:hover{background:var(--surface-2);}
  .save-name-btn{font-size:11px;padding:3px 8px;border-radius:5px;border:none;background:var(--ink);color:#fff;cursor:pointer;}
  .save-name-btn:hover{opacity:.85;}

  .side-nav{display:flex;flex-direction:column;padding:10px;gap:2px;border-bottom:1px solid var(--line);}
  .side-nav-btn{
    display:flex;align-items:center;gap:9px;width:100%;text-align:left;
    border:1px solid transparent;background:transparent;border-radius:8px;
    padding:9px 10px;font-size:13.5px;font-weight:500;color:var(--ink-soft);
  }
  .side-nav-btn .ic{width:16px;text-align:center;flex-shrink:0;font-size:14px;}
  .side-nav-btn:hover{background:var(--surface-2);color:var(--ink);}
  .side-nav-btn.active{background:var(--ink);color:#fff;}

  .farm-section-label{
    padding:12px 14px 4px;font-size:11px;color:var(--ink-soft);
    text-transform:uppercase;letter-spacing:.05em;font-weight:600;
  }
  .farm-list{flex:1;overflow-y:auto;padding:2px 10px 10px;display:flex;flex-direction:column;gap:3px;}
  .farm-item{
    position:relative;border:1px solid transparent;border-radius:8px;
    padding:9px 10px;cursor:pointer;display:flex;flex-direction:column;gap:2px;
  }
  .farm-item:hover{background:var(--surface-2);}
  .farm-item.active{background:var(--actual-soft);border-color:var(--actual);}
  .farm-item-row{display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .farm-item-name{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;}
  .farm-item-icon{font-size:13px;flex-shrink:0;}
  .farm-item-meta{font-size:11px;color:var(--ink-soft);}
  .farm-item-actions{display:none;gap:2px;flex-shrink:0;}
  .farm-item:hover .farm-item-actions{display:flex;}
  .farm-item .icon-btn{
    border:none;background:transparent;padding:2px 5px;font-size:12px;border-radius:5px;color:var(--ink-soft);
  }
  .farm-item .icon-btn:hover{background:var(--surface);color:var(--ink);}
  .scenario-pill-mini{
    display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;
    padding:1px 7px;border-radius:20px;margin-top:2px;width:fit-content;
  }
  .scenario-pill-mini .dotsm{width:5px;height:5px;border-radius:50%;}

  .sidebar-footer{padding:10px 14px 14px;border-top:1px solid var(--line);}
  .add-farm-btn{width:100%;justify-content:center;display:flex;align-items:center;gap:6px;}

  /* ===== MAIN ===== */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
  .topbar{
    position:sticky;top:0;z-index:5;background:var(--bg);
    padding:18px 28px 0;border-bottom:1px solid var(--line);
  }
  .topbar-title{display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding-bottom:14px;}
  .topbar-title h1{font-size:21px;display:flex;align-items:center;gap:9px;}
  .title-icon{font-size:19px;}
  .topbar-title .sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .topbar-right{display:flex;gap:8px;align-items:center;}

  .tabs{display:flex;gap:4px;}
  .tab-btn{
    background:transparent;border:none;border-radius:0;padding:9px 4px;margin-right:18px;
    font-size:13.5px;font-weight:600;color:var(--ink-soft);border-bottom:2px solid transparent;
  }
  .tab-btn:hover{color:var(--ink);}
  .tab-btn.active{color:var(--ink);border-bottom-color:var(--ink);}

  .content{padding:22px 28px 60px;flex:1;}

  /* scenario pill bar on twin view */
  .scenario-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
  .scenario-pill-btn{
    display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:30px;
    border:1.5px solid var(--line);background:var(--surface);font-weight:600;font-size:13px;color:var(--ink-soft);
  }
  .scenario-pill-btn .dotsm{width:7px;height:7px;border-radius:50%;background:var(--ink-soft);flex-shrink:0;}
  .scenario-pill-btn .pill-icon{font-size:13px;line-height:1;flex-shrink:0;}
  .scenario-pill-btn:hover{border-color:var(--ink-soft);color:var(--ink);}
  .scenario-pill-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .scenario-pill-btn.active .dotsm{background:#fff;}
  .scenario-pill-btn.add-custom{border-style:dashed;}

  .banner{
    display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;
    font-size:13px;font-weight:500;margin-bottom:16px;
  }
  .banner.amber{background:var(--amber-soft);color:#7a4d10;}
  .banner.stale{background:#F4E3E0;color:#7a2a20;}
  .banner-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0;}

  /* ===== DASHBOARD: actual/virtual stacked sections ===== */
  .twin-section{margin-bottom:26px;}
  .twin-section-head{
    display:flex;align-items:center;gap:10px;padding-bottom:10px;margin-bottom:14px;
    border-bottom:2px solid var(--line);
  }
  .twin-section-head .dot{width:9px;height:9px;border-radius:50%;}
  .dot.actual{background:var(--actual);}
  .dot.virtual{background:var(--virtual);}
  .twin-section-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;}
  .twin-section-count{
    margin-left:auto;font-size:11.5px;color:var(--ink-soft);background:var(--surface-2);
    padding:2px 9px;border-radius:20px;font-weight:600;
  }

  .twin-cols{display:grid;grid-template-columns:280px 1fr;gap:18px;}
  @media (max-width:880px){ .twin-cols{grid-template-columns:1fr;} }
  .sensor-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 28px;}
  .sensor-grid .sensor-row{grid-column:span 1;}
  @media (max-width:760px){ .sensor-grid{grid-template-columns:1fr;} }

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .panel-head{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--surface-2);}
  .panel-title{font-size:12.5px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);}
  .panel-body{padding:14px;}

  /* image upload box (actual side) */
  .img-upload-box{
    aspect-ratio:1/1;border:1.5px dashed var(--line);border-radius:8px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    background:var(--surface-2);overflow:hidden;position:relative;margin-bottom:10px;
  }
  .img-upload-box:hover{border-color:var(--actual);}
  .img-upload-box img{width:100%;height:100%;object-fit:cover;}
  .img-upload-box .plus{font-size:26px;color:var(--ink-soft);font-weight:300;}
  .img-meta{font-size:11.5px;color:var(--ink-soft);display:flex;flex-direction:column;gap:3px;}
  .img-meta b{color:var(--ink);font-weight:600;}

  .sensor-row{padding:11px 0;border-bottom:1px solid var(--surface-2);}
  .sensor-row:last-child{border-bottom:none;}
  .sensor-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px;}
  .sensor-name{font-weight:600;font-size:13.5px;}
  .sensor-meta{font-size:11px;color:var(--ink-soft);margin-top:1px;}
  .sensor-value{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;white-space:nowrap;}
  .sensor-value .unit{font-size:11px;color:var(--ink-soft);font-weight:500;margin-left:3px;}
  .override-flag{
    display:inline-block;margin-left:7px;font-size:10px;font-weight:700;text-transform:uppercase;
    background:var(--amber-soft);color:#7a4d10;padding:1px 7px;border-radius:20px;letter-spacing:.03em;
  }
  .stale-tag{color:var(--danger);}

  .rangebar-track{height:6px;background:var(--surface-2);border-radius:4px;position:relative;}
  .rangebar-fill{position:absolute;left:0;top:0;height:100%;border-radius:4px;background:var(--virtual);}
  .rangebar.actual .rangebar-fill{background:var(--actual);}
  .rangebar.overridden .rangebar-fill{background:var(--amber);}
  .rangebar-marker{position:absolute;top:-3px;width:2px;height:12px;background:var(--ink);border-radius:2px;}
  .rangebar-labels{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-soft);margin-top:4px;}

  .empty-state{
    padding:36px 20px;text-align:center;color:var(--ink-soft);font-size:13.5px;
    border:1.5px dashed var(--line);border-radius:10px;
  }
  .empty-state .big{font-size:15px;color:var(--ink);font-weight:600;margin-bottom:6px;display:block;}

  /* ===== SETTINGS TAB ===== */
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px;}
  @media (max-width:980px){ .settings-grid{grid-template-columns:1fr;} }

  .add-sensor-form{display:flex;flex-direction:column;gap:10px;}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

  .sensor-table-row{
    display:grid;grid-template-columns:1.4fr .8fr 1fr .7fr .7fr auto;gap:8px;align-items:center;
    padding:7px 0;border-bottom:1px solid var(--surface-2);font-size:12.5px;
  }
  .sensor-table-row.head{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;font-weight:600;}
  .mode-badge{
    display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;text-transform:capitalize;
  }
  .mode-badge.actual{background:var(--actual-soft);color:var(--actual);}
  .mode-badge.virtual{background:var(--virtual-soft);color:var(--virtual);}
  .sensor-table-name{display:flex;align-items:center;gap:7px;}

  /* ===== SENSOR LIBRARY (settings) ===== */
  .lib-panel{margin-bottom:22px;}
  .lib-groups{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media (max-width:880px){ .lib-groups{grid-template-columns:1fr;} }
  .lib-group-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .lib-group-count{font-size:11px;color:var(--ink-soft);font-weight:600;}
  .lib-chip-list{display:flex;flex-direction:column;gap:7px;}
  .lib-chip{
    display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line);
    border-radius:9px;background:var(--surface);transition:border-color .15s,background .15s;
  }
  .lib-chip:hover{border-color:var(--ink-soft);background:var(--surface-2);}
  .lib-chip-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
  .lib-chip-icon.sm{font-size:13px;width:16px;}
  .lib-chip-info{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0;}
  .lib-chip-name{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lib-chip-meta{font-size:10.5px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;}
  .lib-add-btn{
    flex-shrink:0;border:1px solid var(--line);background:var(--surface);font-size:11px;font-weight:700;
    padding:4px 10px;border-radius:20px;color:var(--ink);
  }
  .lib-add-btn:hover{background:var(--actual);color:#fff;border-color:var(--actual);}
  .lib-empty{font-size:12px;color:var(--ink-soft);padding:10px 0;}
  .farm-rename-icon{font-size:18px;}

  /* scenario cards in settings */
  .scenario-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:18px;}
  .scenario-card{
    background:var(--surface);border:1px solid var(--line);border-top:4px solid var(--ink-soft);
    border-radius:10px;padding:14px;cursor:pointer;position:relative;transition:transform .1s;
  }
  .scenario-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.06);}
  .scenario-card.open{outline:2px solid var(--ink);outline-offset:-1px;}
  .scenario-card.live{background:var(--amber-soft);}
  .scenario-card-title{display:flex;align-items:center;gap:7px;font-weight:600;font-size:14px;margin-bottom:5px;}
  .scenario-card-title .dot{width:8px;height:8px;border-radius:50%;}
  .scenario-card-title .card-icon{font-size:15px;line-height:1;}
  .scenario-card-status{font-size:11.5px;color:var(--ink-soft);}
  .scenario-card.custom-card{border-style:dashed;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-weight:600;}
  .live-badge{
    position:absolute;top:10px;right:10px;background:var(--amber);color:#fff;font-size:9.5px;

  <!-- SIDEBAR -->

</div>

<div id="overlayRoot"></div>

<script>
/* =========================================================================
   STATE
   Backend contract (assumed, extend on the FastAPI side):
     Farm 1 is "legacy" and keeps using your existing endpoints:
       GET  /farm/actual          GET  /farm/virtual         POST /farm/virtual
     Any new farm created here uses farm-scoped endpoints:
       GET  /farm/{farmId}/actual GET /farm/{farmId}/virtual POST /farm/{farmId}/virtual
     If a request fails (route not built yet), the UI keeps working off
     in-memory simulated values so you can demo the flow before the
     backend routes exist.
   ========================================================================= */

const BASE_SCENARIOS = ['Flood','Drought','Heat Stroke','Excessive Cold'];
const SCENARIO_COLORS = {
  'Flood':'#2E6F9E', 'Drought':'#C97A1B', 'Heat Stroke':'#B23A2E', 'Excessive Cold':'#2E91A8'
};
const CUSTOM_PALETTE = ['#6B4FA0','#3E7C4A','#A84B8F','#1F8A7A','#8A5A2E'];

let state = {
  farms: [],
  activeFarmId: null,
  activeTab: 'dashboard',
  openScenario: null,
  overlay: null,        // 'create' | null
  createDraft: null,
};

function uid(p){ return p+'_'+Math.random().toString(36).slice(2,9); }
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }
function round(n,d){ const f=Math.pow(10,d); return Math.round(n*f)/f; }
function fmt(n,d=1){ if(n===undefined||n===null||isNaN(n)) return '—'; return round(n,d); }
function randIn(min,max,d){ return round(min + Math.random()*(max-min), d); }
function timeAgo(ts){
  if(!ts) return 'never';
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<5) return 'just now';
  if(s<60) return s+'s ago';
  const m = Math.floor(s/60);
  if(m<60) return m+'m ago';
  return Math.floor(m/60)+'h ago';
}
function scenarioColor(name, farm){
  if(SCENARIO_COLORS[name]) return SCENARIO_COLORS[name];
  const customNames = Object.keys(farm.scenarios).filter(n=>!BASE_SCENARIOS.includes(n));
  const idx = customNames.indexOf(name);
  return CUSTOM_PALETTE[idx % CUSTOM_PALETTE.length] || '#6B4FA0';
}
const SCENARIO_ICONS = { 'Flood':'🌊', 'Drought':'🏜️', 'Heat Stroke':'🥵', 'Excessive Cold':'🥶' };
function scenarioIcon(name){ return SCENARIO_ICONS[name] || '⚠️'; }

/* ---------------- sensor schema (matches real Ditto twin JSON) ---------------- */
/* actual = real hardware probes (soil only). virtual = simulated weather/plant/soil-chem/risk layer. */

function defaultSensors(){
  return [
    // ACTUAL — real soil probe (from Ditto "actual" feature)
    {key:'moisture', name:'Soil Moisture', unit:'%', mode:'actual', min:5, max:60, decimals:1, value:9.6},
    {key:'temperature', name:'Soil Temperature', unit:'°C', mode:'actual', min:10, max:38, decimals:1, value:23},
    {key:'ph', name:'Soil pH', unit:'pH', mode:'actual', min:5.0, max:8.0, decimals:2, value:6.41},
    {key:'ec', name:'Electrical Conductivity', unit:'dS/m', mode:'actual', min:0.2, max:12, decimals:2, value:10},
    {key:'nitrogen', name:'Nitrogen (N)', unit:'mg/kg', mode:'actual', min:0, max:180, decimals:0, value:0},
    {key:'phosphorus', name:'Phosphorus (P)', unit:'mg/kg', mode:'actual', min:0, max:120, decimals:0, value:1},
    {key:'potassium', name:'Potassium (K)', unit:'mg/kg', mode:'actual', min:0, max:150, decimals:0, value:2},

    // VIRTUAL — simulated weather / plant / soil-chemistry / risk layer
    {key:'humidity', name:'Humidity', unit:'%', mode:'virtual', min:20, max:100, decimals:1, value:95},
    {key:'airTemperature', name:'Air Temperature', unit:'°C', mode:'virtual', min:8, max:46, decimals:1, value:28},
    {key:'rainfall', name:'Rainfall', unit:'mm', mode:'virtual', min:0, max:200, decimals:1, value:15},
    {key:'windSpeed', name:'Wind Speed', unit:'km/h', mode:'virtual', min:0, max:60, decimals:1, value:5},
    {key:'solarRadiation', name:'Solar Radiation', unit:'W/m²', mode:'virtual', min:0, max:1100, decimals:0, value:750},
    {key:'sunlightHours', name:'Sunlight (cumulative)', unit:'hrs', mode:'virtual', min:0, max:3000, decimals:0, value:1000},
    {key:'uvIndex', name:'UV Index', unit:'idx', mode:'virtual', min:0, max:12, decimals:1, value:6},
    {key:'co2', name:'CO₂ Concentration', unit:'ppm', mode:'virtual', min:300, max:1200, decimals:0, value:420},
    {key:'plantHeight', name:'Plant Height', unit:'mm', mode:'virtual', min:0, max:2000, decimals:0, value:1043},
    {key:'canopyCoverage', name:'Canopy Coverage', unit:'%', mode:'virtual', min:0, max:100, decimals:1, value:5},
    {key:'rootDepth', name:'Root Depth', unit:'cm', mode:'virtual', min:0, max:60, decimals:1, value:5},
    {key:'irrigationRate', name:'Irrigation Rate', unit:'L/hr', mode:'virtual', min:0, max:100, decimals:1, value:20},
    {key:'irrigationDuration', name:'Irrigation Duration', unit:'min', mode:'virtual', min:0, max:180, decimals:0, value:30},
    {key:'soilOrganicMatter', name:'Soil Organic Matter', unit:'%', mode:'virtual', min:0, max:10, decimals:2, value:3.5},
    {key:'soilSalinity', name:'Soil Salinity', unit:'dS/m', mode:'virtual', min:0, max:4, decimals:2, value:0.3},
    {key:'soilCompaction', name:'Soil Compaction', unit:'%', mode:'virtual', min:0, max:100, decimals:1, value:15},
    {key:'calcium', name:'Calcium', unit:'mg/kg', mode:'virtual', min:0, max:300, decimals:0, value:120},
    {key:'magnesium', name:'Magnesium', unit:'mg/kg', mode:'virtual', min:0, max:150, decimals:0, value:45},
    {key:'sulfur', name:'Sulfur', unit:'mg/kg', mode:'virtual', min:0, max:100, decimals:0, value:30},
    {key:'zinc', name:'Zinc', unit:'mg/kg', mode:'virtual', min:0, max:20, decimals:1, value:3},
    {key:'boron', name:'Boron', unit:'mg/kg', mode:'virtual', min:0, max:5, decimals:2, value:0.5},
    {key:'iron', name:'Iron', unit:'mg/kg', mode:'virtual', min:0, max:30, decimals:1, value:8},
    {key:'copper', name:'Copper', unit:'mg/kg', mode:'virtual', min:0, max:10, decimals:1, value:1},
    {key:'manganese', name:'Manganese', unit:'mg/kg', mode:'virtual', min:0, max:20, decimals:1, value:4},
    {key:'diseaseRisk', name:'Disease Risk', unit:'%', mode:'virtual', min:0, max:100, decimals:0, value:10},
    {key:'pestRisk', name:'Pest Risk', unit:'%', mode:'virtual', min:0, max:100, decimals:0, value:15},
    {key:'ndvi', name:'NDVI (Crop Health)', unit:'idx', mode:'virtual', min:0, max:1, decimals:2, value:0.75},
    {key:'evi', name:'EVI (Enhanced Veg. Index)', unit:'idx', mode:'virtual', min:0, max:1, decimals:2, value:0.62},
    {key:'ndwi', name:'NDWI (Water Index)', unit:'idx', mode:'virtual', min:-1, max:1, decimals:2, value:0.55},
    {key:'floodRisk', name:'Flood Risk', unit:'%', mode:'virtual', min:0, max:100, decimals:0, value:5},
    {key:'droughtRisk', name:'Drought Risk', unit:'%', mode:'virtual', min:0, max:100, decimals:0, value:20},
  ];
}

// non-numeric virtual fields kept on the twin but rendered as text, not range bars
function defaultMeta(){
  return { plantingDate:'2026-06-01', daysSincePlanting:7, growthStage:'Seedling', crop:'Tomato', field:'Field A' };
}

function defaultScenarioOverrides(sensors){
  const find = k => sensors.find(s=>s.key===k);
  const mk = (keys, pairs)=>{
    const o={};
    keys.forEach((k,i)=>{ if(find(k)) o[k]={min:pairs[i][0],max:pairs[i][1]}; });
    return o;
  };
  return {
    'Flood': mk(['rainfall','moisture','humidity','floodRisk','droughtRisk'], [[120,200],[45,60],[85,100],[60,100],[0,5]]),
    'Drought': mk(['rainfall','moisture','humidity','airTemperature','droughtRisk','floodRisk'], [[0,2],[5,12],[10,30],[35,46],[60,100],[0,5]]),
    'Heat Stroke': mk(['airTemperature','humidity','moisture','uvIndex'], [[40,46],[10,25],[5,15],[9,12]]),
    'Excessive Cold': mk(['airTemperature','temperature','humidity'], [[-8,2],[0,6],[40,70]]),
  };
}

function createFarm(name, legacy=false, opts={}){
  const sensors = opts.sensors ? JSON.parse(JSON.stringify(opts.sensors)) : defaultSensors();
  const meta = opts.meta ? {...opts.meta} : defaultMeta();
  const defaults = defaultScenarioOverrides(sensors);
  const scenarios = {};
  BASE_SCENARIOS.forEach(s=>{ scenarios[s] = {overrides: defaults[s] || {}, saved:false}; });
  return {
    id: legacy ? 'legacy' : (opts.id || uid('farm')),
    name, legacy,
    field: meta.field, crop: meta.crop,
    sensors, meta, scenarios,
    activeScenario: null,
    actualStale: false,
    lastActualOk: 0,
    timers: {actual:null, virtual:null},
    image: null, // {dataUrl, ts}
    history: [], // [{ts, scenario, snapshot:{key:value}}]
  };
}

function activeFarm(){ return state.farms.find(f=>f.id===state.activeFarmId); }

/* icon glyphs per sensor key — falls back to a mode-based default */
const SENSOR_ICONS = {
  moisture:'💧', temperature:'🌡️', ph:'⚗️', ec:'⚡', nitrogen:'🧪', phosphorus:'🧪', potassium:'🧪',
  humidity:'💦', airTemperature:'🌤️', rainfall:'🌧️', windSpeed:'🌬️', solarRadiation:'☀️',
  sunlightHours:'🕐', uvIndex:'🔆', co2:'☁️', plantHeight:'🌱', canopyCoverage:'🍃', rootDepth:'🌿',
  irrigationRate:'🚿', irrigationDuration:'⏱️', soilOrganicMatter:'🪴', soilSalinity:'🧂',
  soilCompaction:'🪨', calcium:'🧪', magnesium:'🧪', sulfur:'🧪', zinc:'🧪', boron:'🧪', iron:'🧪',
  copper:'🧪', manganese:'🧪', diseaseRisk:'🦠', pestRisk:'🐛', ndvi:'🛰️', evi:'🛰️', ndwi:'🛰️',
  floodRisk:'🌊', droughtRisk:'🏜️',
};
function sensorIcon(s){ return SENSOR_ICONS[s.key] || (s.mode==='actual' ? '📟' : '🧬'); }

/* Combined sensor library pooled from every farm that currently exists.
   Grows as new sensor types are added on any farm. Excludes sensors the
   target farm already has, and is split into actual / virtual groups. */
function sensorLibrary(targetFarm){
  const seen = new Map(); // key -> sensor definition (first one found)
  state.farms.forEach(f=>{
    f.sensors.forEach(s=>{
      if(!seen.has(s.key)) seen.set(s.key, s);
    });
  });
  const have = new Set(targetFarm.sensors.map(s=>s.key));
  const actual = [];
  const virtual = [];
  seen.forEach((s,key)=>{
    if(have.has(key)) return;
    (s.mode==='actual' ? actual : virtual).push(s);
  });
  actual.sort((a,b)=>a.name.localeCompare(b.name));
  virtual.sort((a,b)=>a.name.localeCompare(b.name));
  return {actual, virtual};
}

function addSensorFromLibrary(key){
  const farm = activeFarm(); if(!farm) return;
  if(farm.sensors.some(s=>s.key===key)) return;
  let src = null;
  for(const f of state.farms){
    const found = f.sensors.find(s=>s.key===key);
    if(found){ src = found; break; }
  }
  if(!src) return;
  farm.sensors.push({...src});
  renderContent();
}

/* ---------------- backend I/O (graceful fallback) ---------------- */

function actualUrl(farm){ return farm.legacy ? '/farm/actual' : `/farm/${farm.id}/actual`; }
function virtualUrl(farm){ return farm.legacy ? '/farm/virtual' : `/farm/${farm.id}/virtual`; }

async function tickActual(farm){
  try{
    const res = await fetch(actualUrl(farm));
    if(!res.ok) throw new Error('status '+res.status);
    const data = await res.json();
    farm.sensors.forEach(s=>{
      if(s.mode==='actual' && data[s.key]!==undefined && data[s.key]!==null){
        s.value = data[s.key];
      }
    });
    farm.actualStale = false;
    farm.lastActualOk = Date.now();
  }catch(e){
    // backend route missing or offline — keep last known actual values (passthrough)
    farm.actualStale = true;
  }
  if(farm.id===state.activeFarmId && state.activeTab==='dashboard') renderContent();
}

function activeOverrideFor(farm, sensorKey){
  if(!farm.activeScenario) return null;
  const cfg = farm.scenarios[farm.activeScenario];
  return cfg && cfg.overrides[sensorKey] ? cfg.overrides[sensorKey] : null;
}

function snapshotFarm(farm){
  const snap = {};
  farm.sensors.forEach(s=>{ snap[s.key]=s.value; });
  return snap;
}

function tickVirtual(farm){
  farm.sensors.forEach(s=>{
    const override = activeOverrideFor(farm, s.key);
    if(override){
      s.value = randIn(override.min, override.max, s.decimals);
    } else if(s.mode==='virtual'){
      s.value = randIn(s.min, s.max, s.decimals);
    }
    // actual-mode sensors with no active override keep whatever tickActual gave them
  });
  publishVirtual(farm);
  farm.history.push({ts:Date.now(), scenario:farm.activeScenario, snapshot:snapshotFarm(farm)});
  if(farm.history.length>200) farm.history.shift();
  if(farm.id===state.activeFarmId && state.activeTab==='dashboard') renderContent();
}

async function publishVirtual(farm){
  const payload = {};
  farm.sensors.forEach(s=>{
    if(s.mode==='virtual' || activeOverrideFor(farm,s.key)) payload[s.key]=s.value;
  });
  try{
    await fetch(virtualUrl(farm), {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
  }catch(e){ /* route not built yet — value still tracked locally for the demo */ }
}

function startFarmTimers(farm){
  stopFarmTimers(farm);
  farm.timers.actual = setInterval(()=>tickActual(farm), 3000);
  farm.timers.virtual = setInterval(()=>tickVirtual(farm), 4000);
  tickActual(farm); tickVirtual(farm);
}
function stopFarmTimers(farm){
  if(farm.timers.actual) clearInterval(farm.timers.actual);
  if(farm.timers.virtual) clearInterval(farm.timers.virtual);
}

/* ---------------- farm management ---------------- */

function selectFarm(id){ state.activeFarmId = id; state.openScenario=null; renderAll(); }
function setTab(tab){ state.activeTab = tab; state.openScenario=null; if(tab==='sensors') loadSensors(); renderAll(); }

function duplicateFarm(id){
  const src = state.farms.find(f=>f.id===id);
  if(!src) return;
  const farm = createFarm(src.name+' (copy)', false, {sensors:src.sensors, meta:src.meta});
  farm.scenarios = JSON.parse(JSON.stringify(src.scenarios));
  state.farms.push(farm);
  state.activeFarmId = farm.id;
  startFarmTimers(farm);
  renderAll();
}

async function removeFarm(id){
  const farm = state.farms.find(f=>f.id===id);
  if(!farm) return;
  if(!confirm(`Permanently delete "${farm.name}"? This removes it from Ditto and cannot be undone.`)) return;

  stopFarmTimers(farm);

  if(!farm.legacy && !farm.isPlaceholder){
    try{
      const res = await fetch(`/farms/${farm.id}`, { method: 'DELETE' });
      if(!res.ok){
        const body = await res.json().catch(()=>({}));
        alert('Could not delete farm on the server: ' + (body.detail || res.status));
        return; // don't remove locally if the server-side delete failed
      }
    }catch(e){
      alert('Could not reach the backend to delete this farm. It has not been removed.');
      return;
    }
  }

  state.farms = state.farms.filter(f=>f.id!==id);
  if(state.activeFarmId===id){
    state.activeFarmId = state.farms[0] ? state.farms[0].id : null;
  }
  renderAll();
}

function renameFarm(id, name){
  const farm = state.farms.find(f=>f.id===id);
  if(!farm || !name.trim()) return;
  farm.name = name.trim();
  renderSidebar();
  document.getElementById('farmTitle').innerHTML = `<span class="title-icon">${cropIcon(farm.crop)}</span>${farm.name}`;
}

/* ---------------- image upload (actual side) ---------------- */

function triggerImageUpload(){
  const input = document.getElementById('hiddenImgInput');
  input.click();
}
function handleImageUpload(evt){
  const farm = activeFarm(); if(!farm) return;
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    farm.image = {dataUrl: reader.result, ts: Date.now()};
    renderContent();
  };
  reader.readAsDataURL(file);
  evt.target.value = '';
}
function viewImage(){
  const farm = activeFarm();
  if(farm && farm.image) window.open(farm.image.dataUrl, '_blank');
}

/* ---------------- sensor configurator ---------------- */

function addSensorFromForm(){
  const farm = activeFarm(); if(!farm) return;
  const name = document.getElementById('newSensorName').value.trim();
  const unit = document.getElementById('newSensorUnit').value.trim();
  const mode = document.getElementById('newSensorMode').value;
  const min = parseFloat(document.getElementById('newSensorMin').value);
  const max = parseFloat(document.getElementById('newSensorMax').value);
  if(!name || isNaN(min) || isNaN(max) || min>=max){
    alert('Give the sensor a name and a valid min < max range.');
    return;
  }
  const key = name.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'') || uid('sensor');
  if(farm.sensors.some(s=>s.key===key)){ alert('A sensor with this name already exists.'); return; }
  farm.sensors.push({key, name, unit, mode, min, max, decimals: (max-min)<5 ? 2 : 1, value: round((min+max)/2,1)});
  renderContent();
}

function removeSensor(key){
  const farm = activeFarm(); if(!farm) return;
  farm.sensors = farm.sensors.filter(s=>s.key!==key);
  Object.keys(farm.scenarios).forEach(s=>{ delete farm.scenarios[s].overrides[key]; });
  renderContent();
}

function updateSensorRange(key, field, value){
  const farm = activeFarm(); if(!farm) return;
  const sensor = farm.sensors.find(s=>s.key===key); if(!sensor) return;
  const v = parseFloat(value);
  if(!isNaN(v)) sensor[field]=v;
}

function toggleSensorMode(key){
  const farm = activeFarm(); if(!farm) return;
  const sensor = farm.sensors.find(s=>s.key===key); if(!sensor) return;
  sensor.mode = sensor.mode==='actual' ? 'virtual' : 'actual';
  renderContent();
}

/* ---------------- scenarios ---------------- */

function openScenario(name){
  state.openScenario = state.openScenario===name ? null : name;
  renderContent();
}

function updateOverride(scenario, key, field, value){
  const farm = activeFarm(); if(!farm) return;
  const cfg = farm.scenarios[scenario];
  if(!cfg.overrides[key]) cfg.overrides[key] = {min:0,max:0};
  const v = parseFloat(value);
  if(!isNaN(v)) cfg.overrides[key][field]=v;
}

function toggleOverrideActive(scenario, key, checked){
  const farm = activeFarm(); if(!farm) return;
  const cfg = farm.scenarios[scenario];
  if(checked){
    if(!cfg.overrides[key]){
      const sensor = farm.sensors.find(s=>s.key===key);
      cfg.overrides[key] = {min:sensor.min, max:sensor.max};
    }
  } else {
    delete cfg.overrides[key];
  }
  renderContent();
}

function saveScenario(scenario){
  const farm = activeFarm(); if(!farm) return;
  farm.scenarios[scenario].saved = true;
  renderContent();
  flashSaved();
}

function flashSaved(){
  const b = document.getElementById('saveFlash');
  if(!b) return;
  b.style.opacity = 1;
  setTimeout(()=>{ if(b) b.style.opacity = 0; }, 1200);
}

function applyScenario(scenario){
  const farm = activeFarm(); if(!farm) return;
  if(Object.keys(farm.scenarios[scenario].overrides).length===0){
    alert('Configure at least one sensor override before applying this scenario.');
    return;
  }
  farm.activeScenario = scenario;
  farm.scenarios[scenario].saved = true;
  renderAll();
}

function deactivateScenario(){
  const farm = activeFarm(); if(!farm) return;
  farm.activeScenario = null;
  renderAll();
}

function quickSwitchScenario(name){
  const farm = activeFarm(); if(!farm) return;
  if(name===null){ deactivateScenario(); return; }
  const cfg = farm.scenarios[name];
  if(!cfg || Object.keys(cfg.overrides).length===0){
    // jump to settings to configure it first
    state.activeTab = 'settings';
    state.openScenario = name;
    renderAll();
    return;
  }
  applyScenario(name);
}

function addCustomScenario(){
  const farm = activeFarm(); if(!farm) return;
  const name = prompt('Name this scenario (e.g. "Frost Warning", "Pest Outbreak"):');
  if(!name || !name.trim()) return;
  const clean = name.trim();
  if(farm.scenarios[clean]){ alert('A scenario with this name already exists.'); return; }
  farm.scenarios[clean] = {overrides:{}, saved:false};
  state.openScenario = clean;
  renderContent();
}

function removeScenario(name){
  const farm = activeFarm(); if(!farm) return;
  if(BASE_SCENARIOS.includes(name)){ alert('Built-in scenarios can be reconfigured but not removed.'); return; }
  if(!confirm(`Remove the "${name}" scenario?`)) return;
  if(farm.activeScenario===name) farm.activeScenario=null;
  delete farm.scenarios[name];
  if(state.openScenario===name) state.openScenario=null;
  renderAll();
}

async function confirmCreateFarm(){
  const d = state.createDraft;
  const nameInput = document.getElementById('cfName');
  const fieldInput = document.getElementById('cfField');
  const cropInput = document.getElementById('cfCrop');
  const name = (nameInput ? nameInput.value : d.name).trim() || d.name;
  const field = (fieldInput ? fieldInput.value : d.field).trim() || d.field;
  const crop = (cropInput ? cropInput.value : d.crop).trim() || d.crop;

  let sensors = null;
  if(d.presetId==='soil-only'){
    sensors = defaultSensors().filter(s=>s.mode==='actual');
  } else if(d.presetId==='blank'){
    sensors = [];
  } // 'tomato' -> null -> full defaults

  let farmId = null;
  try{
    const res = await fetch('/farms', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, field, crop})
    });
    if(res.ok){
      const data = await res.json();
      farmId = data.farm_id;
    }
  }catch(e){ /* backend unreachable — falls back to a local-only demo farm */ }

  const farm = createFarm(name, false, {id: farmId || undefined, sensors, meta:{field, crop, plantingDate:new Date().toISOString().slice(0,10), daysSincePlanting:0, growthStage:'Seedling'}});

  state.activeFarmId = farm.id;
  state.activeTab = 'dashboard';
  startFarmTimers(farm);
  closeOverlay();
  renderAll();
}

const CROP_ICONS = {tomato:'🍅', wheat:'🌾', rice:'🌾', corn:'🌽', maize:'🌽', cotton:'☁️', potato:'🥔', onion:'🧅', chili:'🌶️', chilli:'🌶️', sugarcane:'🎋', soybean:'🫘', mango:'🥭', banana:'🍌'};
function cropIcon(crop){
  if(!crop) return '🌱';
  const k = crop.trim().toLowerCase();
  return CROP_ICONS[k] || '🌱';
}

function renderAll(){ renderSidebar(); renderContent(); renderOverlay(); }

function renderSidebar(){
  document.querySelectorAll('.side-nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===state.activeTab));
  const list = document.getElementById('farmList');
  list.innerHTML = state.farms.map(f=>{
    const activeSensors = f.sensors.length;
    const live = f.activeScenario;
    const color = live ? scenarioColor(live, f) : null;
    return `
      <div class="farm-item ${f.id===state.activeFarmId?'active':''}" onclick="selectFarm('${f.id}')">
        <div class="farm-item-row">
          <div class="farm-item-name"><span class="farm-item-icon">${cropIcon(f.crop)}</span>${f.name}</div>
          <div class="farm-item-actions">
            <button class="icon-btn" title="Duplicate" onclick="event.stopPropagation();duplicateFarm('${f.id}')">⧉</button>
            <button class="icon-btn" title="Remove" onclick="event.stopPropagation();removeFarm('${f.id}')">✕</button>
          </div>
        </div>
        <div class="farm-item-meta">${f.crop || ''} · ${activeSensors} sensors</div>
        ${live ? `<span class="scenario-pill-mini" style="background:${color}22;color:${color}"><span class="dotsm" style="background:${color}"></span>${live}</span>` : ''}
      </div>
    `;
  }).join('') || '<div class="empty-state" style="margin:8px 4px;">No farms yet. Click "+ Create Farm" below.</div>';
}

function rangeBar(sensor, override){
  const min = override ? override.min : sensor.min;
  const max = override ? override.max : sensor.max;
  const pct = clamp(((sensor.value-min)/((max-min)||1))*100, 0, 100);
  const cls = override ? 'overridden' : sensor.mode;
  return `
    <div class="rangebar ${cls}">
      <div class="rangebar-track">
        <div class="rangebar-fill" style="width:${pct}%"></div>
        <div class="rangebar-marker" style="left:${pct}%"></div>
      </div>
      <div class="rangebar-labels"><span>${fmt(min,sensor.decimals)}</span><span>${fmt(max,sensor.decimals)} ${sensor.unit}</span></div>
    </div>
  `;
}

function sensorRow(sensor, farm){
  const override = activeOverrideFor(farm, sensor.key);
  const stale = sensor.mode==='actual' && farm.actualStale && !override;
  return `
    <div class="sensor-row">
      <div class="sensor-row-top">
        <div>
          <div class="sensor-name">${sensor.name}${override ? `<span class="override-flag">${farm.activeScenario}</span>`:''}</div>
          <div class="sensor-meta">updated ${timeAgo(Date.now())}${stale?'<span class="stale-tag"> · using last known value</span>':''}</div>
        </div>
        <div class="sensor-value">${fmt(sensor.value, sensor.decimals)}<span class="unit">${sensor.unit}</span></div>
      </div>
      ${rangeBar(sensor, override)}
    </div>
  `;
}

function renderContent(){
  const farm = activeFarm();
  const content = document.getElementById('content');

  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===state.activeTab));
  document.querySelectorAll('.side-nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===state.activeTab));

  // Sensors tab doesn't require a farm — handle it first
  if(state.activeTab==='sensors'){
    document.getElementById('farmTitle').textContent = 'Sensor Registry';
    document.getElementById('farmSub').textContent = 'All sensors discovered from MQTT — rename and map to farms';
    content.innerHTML = renderSensors();
    return;
  }

  document.getElementById('farmTitle').innerHTML = farm ? `<span class="title-icon">${cropIcon(farm.crop)}</span>${farm.name}` : 'No farm selected';
  document.getElementById('farmSub').textContent = farm
    ? `${farm.field || ''}${farm.field && farm.crop ? ' · ' : ''}${farm.crop || ''}${farm.activeScenario ? ' · Scenario: '+farm.activeScenario : (farm.field||farm.crop ? ' · Normal conditions' : 'Normal conditions')}`
    : 'Create a farm to get started';

  if(!farm){
    content.innerHTML = `<div class="empty-state"><span class="big">No farm yet</span>Click "+ Create Farm" in the left sidebar to set up your first digital twin.</div>`;
    return;
  }

  if(state.activeTab==='dashboard') content.innerHTML = renderDashboard(farm);
  else content.innerHTML = renderSettings(farm);
}

// ---- sensor registry state & helpers ----

let sensorState = {
  sensors: [],
  farms: [],   // [{farm_id, name}] for the map dropdown
  loading: false
};

async function loadSensors(){
  sensorState.loading = true;
  try{
    const [sRes, fRes] = await Promise.all([
      fetch('/sensors'),
      fetch('/farms')
    ]);
    if(sRes.ok) sensorState.sensors = (await sRes.json()).sensors || [];
    if(fRes.ok) sensorState.farms = (await fRes.json()).farms || [];
  }catch(e){ console.error('loadSensors:', e); }
  sensorState.loading = false;
  if(state.activeTab==='sensors') renderContent();
}

function renderSensors(){
  const newSensors = sensorState.sensors.filter(s=>s.isNew);
  const knownSensors = sensorState.sensors.filter(s=>!s.isNew);
  const farmOptions = sensorState.farms.map(f=>`<option value="${f.farm_id}">${f.name}</option>`).join('');
  const totalThings = sensorState.farms.length;
  const totalSensors = sensorState.sensors.length;

  function sensorRow(s){
    return `
    <tr class="${s.isNew ? 'is-new' : ''}">
      <td>
        <span class="sensor-id">${s.sensorId}</span>
        ${s.isNew ? '<span class="new-pill">NEW</span>' : ''}
      </td>
      <td class="mono" style="color:var(--ink-soft);font-size:12px;">${s.rawKey || '—'}</td>
      <td>
        <div class="inline-rename">
          <input id="sname_${s.rawKey}" value="${s.name || ''}" placeholder="Sensor name">
          <button class="save-name-btn" onclick="doRenameSensor('${s.rawKey}')">Save</button>
        </div>
      </td>
      <td>
        <select class="sensor-farm-select" data-rawkey="${s.rawKey}" onchange="doMapSensor('${s.rawKey}', this.value)">
          <option value="">— unassigned —</option>
          ${farmOptions}
        </select>
      </td>
      <td>${s.firstSeen ? s.firstSeen.slice(0,19).replace('T',' ') : '—'}</td>
      <td>
        ${s.isNew
          ? `<button class="ack-btn" onclick="doAckSensor('${s.rawKey}')">Mark seen</button>`
          : ''}
      </td>
    </tr>`;
  }

  const tableHead = `
    <table class="sensor-table">
      <thead><tr>
        <th>ID</th><th>Raw Key</th><th>Name</th><th>Mapped Farm</th><th>First Seen</th><th></th>
      </tr></thead>
      <tbody>`;
  const tableClose = `</tbody></table>`;

  let html = `<div class="sensor-page">
    <h2>Sensor Registry</h2>
    <p class="sp-sub">
      Things on Ditto: <b>${totalThings}</b> &nbsp;·&nbsp;
      Sensors discovered: <b>${totalSensors}</b>
      ${newSensors.length > 0 ? `&nbsp;·&nbsp; <span style="color:var(--amber);font-weight:600;">⬤ ${newSensors.length} new</span>` : ''}
    </p>`;

  if(sensorState.loading){
    html += `<div style="color:var(--ink-soft);padding:20px;">Loading sensors…</div>`;
  } else if(sensorState.sensors.length === 0){
    html += `<div style="color:var(--ink-soft);padding:20px;">No sensors discovered yet. Start your MQTT pipeline — sensors appear here automatically as Ditto picks them up.</div>`;
  } else {
    if(newSensors.length > 0){
      html += `<div class="sensor-section">
        <div class="sensor-section-label">🟡 Newly Discovered (${newSensors.length})</div>
        ${tableHead}${newSensors.map(sensorRow).join('')}${tableClose}
      </div>`;
    }
    if(knownSensors.length > 0){
      html += `<div class="sensor-section">
        <div class="sensor-section-label">Known Sensors (${knownSensors.length})</div>
        ${tableHead}${knownSensors.map(sensorRow).join('')}${tableClose}
      </div>`;
    }
  }

  html += `</div>`;

  // Re-set farm select values after innerHTML render
  setTimeout(()=>{
    sensorState.sensors.forEach(s=>{
      const sel = document.querySelector(`[data-rawkey="${s.rawKey}"]`);
      if(sel && s.farmId) sel.value = s.farmId;
    });
  }, 0);

  return html;
}

async function doRenameSensor(rawKey){
  const input = document.getElementById(`sname_${rawKey}`);
  if(!input) return;
  const newName = input.value.trim();
  if(!newName) return;
  try{
    const res = await fetch(`/sensors/${rawKey}/rename`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name: newName})
    });
    if(res.ok){
      const s = sensorState.sensors.find(x=>x.rawKey===rawKey);
      if(s) s.name = newName;
      input.style.borderColor = 'var(--ok)';
      setTimeout(()=>{ input.style.borderColor = ''; }, 1500);
    }
  }catch(e){ console.error('rename sensor:', e); }
}

async function doMapSensor(rawKey, farmId){
  try{
    await fetch(`/sensors/${rawKey}/map`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({farm_id: farmId || null})
    });
    const s = sensorState.sensors.find(x=>x.rawKey===rawKey);
    if(s) s.farmId = farmId || null;
  }catch(e){ console.error('map sensor:', e); }
}

async function doAckSensor(rawKey){
  try{
    await fetch(`/sensors/${rawKey}/acknowledge`, {method:'POST'});
    const s = sensorState.sensors.find(x=>x.rawKey===rawKey);
    if(s) s.isNew = false;
    if(state.activeTab==='sensors') renderContent();
  }catch(e){ console.error('ack sensor:', e); }
}

          <div class="panel-body">
            ${actualSensors.map(s=>sensorRow(s,farm)).join('') || (farm.activeScenario ? `<div class="empty-state">No actual sensors are included in the <b>${farm.activeScenario}</b> scenario.</div>` : '<div class="empty-state">No actual sensors configured for this farm.</div>')}
          </div>
        </div>

    <div class="twin-section">
      <div class="twin-section-head">

        <div class="panel-head"><span class="panel-title">🌤️ Simulated Weather, Plant &amp; Soil-Chemistry</span></div>

          <div class="sensor-grid">
            ${virtualSensors.map(s=>sensorRow(s,farm)).join('') || (farm.activeScenario ? `<div class="empty-state">No virtual sensors are included in the <b>${farm.activeScenario}</b> scenario.</div>` : '<div class="empty-state">No virtual sensors configured for this farm.</div>')}
          </div>

}

      <div class="farm-rename">
        <span class="farm-rename-icon">🌾</span>
        <input type="text" value="${farm.name}" onchange="renameFarm('${farm.id}', this.value)">
      </div>
      <button id="saveFlash" class="ghost" style="opacity:0;color:var(--ok);transition:opacity .3s;pointer-events:none;">✓ Saved</button>
    </div>

    <div class="settings-grid">
      <div class="panel">
        <div class="panel-head"><span class="panel-title">＋ New Sensor</span></div>
        <div class="panel-body">
          <div class="add-sensor-form">
            <div><label>Name</label><input type="text" id="newSensorName" placeholder="e.g. Leaf Wetness"></div>
            <div class="form-row-2">
              <div><label>Unit</label><input type="text" id="newSensorUnit" placeholder="%"></div>
              <div><label>Source</label>
                <select id="newSensorMode">
                  <option value="actual">Actual (hardware)</option>
                  <option value="virtual" selected>Virtual (simulated)</option>
                </select>
              </div>
            </div>
            <div class="form-row-2">
              <div><label>Min</label><input type="number" id="newSensorMin" step="any"></div>
              <div><label>Max</label><input type="number" id="newSensorMax" step="any"></div>
            </div>
            <button class="primary" onclick="addSensorFromForm()">+ Create Sensor</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><span class="panel-title">📋 All Sensors — ${farm.name}</span><span class="panel-count" style="margin-left:auto;font-size:11px;color:var(--ink-soft);">${farm.sensors.length}</span></div>
        <div class="panel-body" style="max-height:340px;overflow-y:auto;">
          <div class="sensor-table-row head">
            <div>Name</div><div>Source</div><div>Unit</div><div>Min</div><div>Max</div><div></div>
          </div>
          ${farm.sensors.map(s=>`
            <div class="sensor-table-row">
              <div class="sensor-table-name"><span class="lib-chip-icon sm">${sensorIcon(s)}</span>${s.name}</div>
              <div><span class="mode-badge ${s.mode}" style="cursor:pointer" onclick="toggleSensorMode('${s.key}')">${s.mode}</span></div>
              <div>${s.unit}</div>
              <div><input type="number" step="any" value="${s.min}" onchange="updateSensorRange('${s.key}','min',this.value)"></div>
              <div><input type="number" step="any" value="${s.max}" onchange="updateSensorRange('${s.key}','max',this.value)"></div>
              <div><button class="icon-btn danger-btn" onclick="removeSensor('${s.key}')">Remove</button></div>
            </div>
          `).join('') || '<div class="empty-state">No sensors yet — add one on the left.</div>'}
        </div>
      </div>
    </div>

    <div class="panel lib-panel">
      <div class="panel-head">
        <span class="panel-title">🗂 Sensor Library — from all farms</span>
        <span class="panel-count" style="margin-left:auto;font-size:11px;color:var(--ink-soft);">${libCount} available</span>
      </div>
      <div class="panel-body">
        <div class="helper-text" style="margin-bottom:14px;">Every sensor type that exists on any of your farms shows up here. Add any of them straight onto <b>${farm.name}</b> instead of recreating them from scratch.</div>
        ${libCount ? `<div class="lib-groups">
          ${libGroup('Actual', lib.actual, 'actual')}
          ${libGroup('Virtual', lib.virtual, 'virtual')}
        </div>` : `<div class="empty-state">No other sensor types yet — create farms or sensors elsewhere and they'll appear here for reuse.</div>`}
      </div>
    </div>

    ${renderScenarioConfigSection(farm)}
  `;
}

function renderScenarioConfigSection(farm){
  const allNames = [...BASE_SCENARIOS, ...Object.keys(farm.scenarios).filter(n=>!BASE_SCENARIOS.includes(n))];
  const cards = allNames.map(name=>{
    const cfg = farm.scenarios[name];
    const color = scenarioColor(name, farm);
    const overrideCount = Object.keys(cfg.overrides).length;
    const isLive = farm.activeScenario===name;
    const isOpen = state.openScenario===name;
    const isCustom = !BASE_SCENARIOS.includes(name);
    return `
      <div class="scenario-card ${isOpen?'open':''} ${isLive?'live':''}" style="border-top-color:${color}" onclick="openScenario('${name}')">
        <div class="scenario-card-title"><span class="card-icon">${scenarioIcon(name)}</span>${name}</div>
        <div class="scenario-card-status">${overrideCount ? overrideCount+' sensor(s) configured' : 'Not configured'}${isCustom?' · custom':''}</div>
        ${isLive ? '<span class="live-badge">Active now</span>' : ''}
      </div>
    `;
  }).join('');

  let editor = '';
  if(state.openScenario && farm.scenarios[state.openScenario]){
    const name = state.openScenario;
    const cfg = farm.scenarios[name];
    const isLive = farm.activeScenario===name;
    const isCustom = !BASE_SCENARIOS.includes(name);
    editor = `
      <div class="scenario-editor">
        <div class="scenario-editor-head">
          <div>
            <h3>${name} configuration</h3>
            <div class="helper-text">Tick a sensor to override it whenever ${name} is applied. Every time this scenario runs, those sensors generate values inside the range you set here — everything else keeps behaving normally.</div>
          </div>
          <div class="scenario-editor-actions">
            ${isCustom ? `<button class="danger-btn" onclick="removeScenario('${name}')">Delete scenario</button>` : ''}
            <button onclick="saveScenario('${name}')">Save configuration</button>
            ${isLive
              ? `<button class="danger-btn" onclick="deactivateScenario()">Stop scenario</button>`
              : `<button class="primary" onclick="applyScenario('${name}')">Apply scenario</button>`}
          </div>
        </div>
        ${farm.sensors.map(s=>{
          const ov = cfg.overrides[s.key];
          const checked = !!ov;
          const min = ov ? ov.min : '';
          const max = ov ? ov.max : '';
          return `
            <div class="override-row">
              <div>
                <input type="checkbox" style="width:auto;display:inline-block;margin-right:8px;" ${checked?'checked':''} onchange="toggleOverrideActive('${name}','${s.key}',this.checked)">
                <span class="sname">${s.name} <span style="color:var(--ink-soft)">(${s.unit})</span></span>
              </div>
              <input type="number" step="any" placeholder="min" value="${min}" ${checked?'':'disabled'} onchange="updateOverride('${name}','${s.key}','min',this.value)">
              <input type="number" step="any" placeholder="max" value="${max}" ${checked?'':'disabled'} onchange="updateOverride('${name}','${s.key}','max',this.value)">
            </div>
          `;
        }).join('') || '<div class="empty-state">Add sensors first to configure this scenario.</div>'}
      </div>
    `;
  }

  return `
    <div class="panel-head" style="background:transparent;border:none;padding:0 0 10px;">
      <span class="panel-title" style="font-size:13px;">Scenarios for ${farm.name}</span>
    </div>
    <div class="scenario-grid">${cards}<div class="scenario-card custom-card" onclick="addCustomScenario()">+ Add custom scenario</div></div>
    ${editor}
  `;
}

/* ---------------- init ---------------- */

(async function init(){
  let loadedAny = false;

  try{
    const res = await fetch('/farms');
    if(res.ok){
      const data = await res.json();
      (data.farms || []).forEach(f=>{
        // The legacy twin (smartfarm:twin01) now comes back through this
        // same /farms list like any other farm — no special-casing needed.
        const isLegacy = f.thing_id === 'smartfarm:twin01';
        const farm = createFarm(f.name || f.farm_id, isLegacy, {
          id: isLegacy ? 'legacy' : f.farm_id,
          meta: {
            field: f.field, crop: f.crop,
            plantingDate: new Date().toISOString().slice(0,10),
            daysSincePlanting: 0, growthStage: 'Seedling'
          }
        });
        state.farms.push(farm);
        startFarmTimers(farm);
        loadedAny = true;
      });
    }
  }catch(e){ /* backend unreachable */ }

  if(!loadedAny){
    // Backend unreachable / no farms exist yet in Ditto at all — show a
    // local-only placeholder so the page isn't blank during development.
    // This is NEVER pushed to Ditto and disappears the moment /farms
    // returns real data, so it can't reappear as a ghost on refresh.
    const placeholder = createFarm('No farms found — check backend connection', true);
    placeholder.isPlaceholder = true;
    state.farms.push(placeholder);
  }

  state.activeFarmId = state.farms[0] ? state.farms[0].id : null;

  // Load sensor registry on startup
  loadSensors();

  document.querySelector('[data-tab="dashboard"].tab-btn')?.classList.add('active');
  document.querySelector('[data-tab="dashboard"].side-nav-btn')?.classList.add('active');
  renderAll();
})();

</script>
</body>
